services:
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: prometheus
    user: '0:0'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - /data/mine-data/prometheus:/prometheus
    network_mode: host
    restart: always
  
  grafana:
    image: grafana/grafana:11.6.3
    container_name: grafana
    user: '0:0'
    environment:
      - GF_SERVER_HTTP_PORT=3030
      - GF_SECURITY_ADMIN_PASSWORD=sense2021
    volumes:
      - /data/mine-data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    network_mode: host
    restart: always
