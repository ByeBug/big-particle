user   nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 100m;
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    server_tokens   off;

    keepalive_timeout  65;

    # 设置代理协议版本为 1.1
    proxy_http_version    1.1;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # include /etc/nginx/conf.d/*.conf;

    upstream backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    server {
        listen 80;

        # 前端打包的 dist 页面
        location / {
            root /data/big-particle-data/frontend/dist;
            index index.html;
            try_files $uri /index.html;
        }

        # DRF API 代理到 Gunicorn
        location /api/ {
            proxy_pass http://backend/;     # 末尾斜杠去除 api 前缀
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django Admin & DRF browsable API 静态资源
        location /static/ {
            alias /data/big-particle-data/static/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Django Admin 页面
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 应用使用的存储
        location /storage/ {
            alias /data/big-particle-data/storage/;

            # 普通情况直接浏览
            types {
                image/jpeg  jpg jpeg;
                image/png   png;
                image/gif   gif;
                application/octet-stream  bin;
            }

            # 如果 URL 上带 download=true 参数 → 强制下载
            if ($arg_download = "true") {
                add_header Content-Disposition "attachment";
                # add_header Content-Type "application/octet-stream";
            }
        }

        # 错误页面
        error_page 404 /index.html;
    }

}
