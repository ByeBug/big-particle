name: big-particle

services:
  pgsql:
    image: postgres:17.5-alpine3.21
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_USER=bigparticle
      - POSTGRES_PASSWORD=bigparticle
      - POSTGRES_DB=bigparticle
      - TZ=Asia/Shanghai
    ports:
      - 15432:5432
    volumes:
      - /data/big-particle-data/pgsql:/var/lib/postgresql/data

  pgadmin4:
    image: dpage/pgadmin4:9.4
    restart: always
    volumes:
      - ./pgadmin4/servers.json:/pgadmin4/servers.json
    environment:
      - PGADMIN_DEFAULT_EMAIL=test@123.com
      - PGADMIN_DEFAULT_PASSWORD=123456
      - TZ=Asia/Shanghai
    ports:
      - "8181:80"

  netdata:
    image: netdata/netdata:v2.5.3
    container_name: netdata
    pid: host
    network_mode: host
    restart: always
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./netdata/netdata.conf:/etc/netdata/netdata.conf
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/dbus:/run/dbus:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  netdatalib:
  netdatacache:
